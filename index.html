function slugInd(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}

function parseIndicadosExcel(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:'array',cellDates:true});
  const result={ind_jog:{},ind_tre:{}};
  const fmtData=v=>{
    if(!v) return '';
    if(v instanceof Date) return String(v.getDate()).padStart(2,'0')+'/'+String(v.getMonth()+1).padStart(2,'0')+'/'+v.getFullYear();
    return String(v).trim();
  };
  const cleanStr=v=>{
    if(v===null||v===undefined) return '';
    let s=String(v).trim();
    if(/^\d+\.0+$/.test(s)) s=s.split('.')[0];
    return s;
  };
  const rand4=()=>Math.floor(Math.random()*9000+1000).toString();
  wb.SheetNames.forEach(name=>{
    const mJog=name.match(/Atletas Oferecidos\s+(\d{4})/i);
    const mTre=name.match(/Treinadores Oferecidos\s+(\d{4})/i);
    if(!mJog&&!mTre) return;
    const ano=(mJog||mTre)[1];
    const isJog=!!mJog;
    const ws=wb.Sheets[name];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(rows.length<3) return;
    const header=rows[1]||[];
    const idxOf=nm=>header.findIndex(h=>String(h||'').trim().toLowerCase()===nm.toLowerCase());
    const cols=isJog?{
      nome: idxOf('Atleta')>=0?idxOf('Atleta'):1,
      avalMkt: idxOf('Avaliação Dep. de Mercado'),
      avalAgrup: idxOf('Avaliação - AGRUPADO'),
      eagle: idxOf('EAGLE'),
      instat: idxOf('INSTAT'),
      posicaoText: idxOf('Posição'),
      posicao: idxOf('POSITION'),
      geracao: idxOf('Geração'),
      pais: idxOf('País'),
      clube: idxOf('Clube'),
      data: idxOf('Data'),
      responsavel: idxOf('Responsável'),
      recepcao: idxOf('Recepção'),
      indicacao: idxOf('Indicação'),
      agencia: idxOf('Agente'),
      monitorado: idxOf('Monitorado'),
      comments: idxOf('Comments')
    }:{
      nome: idxOf('NAME')>=0?idxOf('NAME'):idxOf('Nome'),
      pais: idxOf('Country'),
      idade: idxOf('Age'),
      sistema: idxOf('Main System')>=0?idxOf('Main System'):idxOf('System'),
      clube: idxOf('Current Club')>=0?idxOf('Current Club'):idxOf('Club'),
      data: idxOf('Date')>=0?idxOf('Date'):idxOf('Data'),
      recepcao: idxOf('Reception')>=0?idxOf('Reception'):idxOf('Recepção'),
      indicacao: idxOf('Agent/Intermediary')>=0?idxOf('Agent/Intermediary'):idxOf('Indicação'),
      indicacao2: idxOf('Agent/Intermediary 2'),
      indicacao3: idxOf('Agent/Intermediary 3')
    };
    for(let i=2;i<rows.length;i++){
      const r=rows[i]; if(!r) continue;
      const nome=cleanStr(cols.nome>=0?r[cols.nome]:null);
      if(!nome) continue;
      const obj={ano,nome};
      for(const[k,idx] of Object.entries(cols)){
        if(k==='nome'||idx<0||idx===undefined) continue;
        const v=r[idx];
        if(v===null||v===undefined||v==='') continue;
        obj[k]=(k==='data')?fmtData(v):cleanStr(v);
      }
      const id='i'+(isJog?'j':'t')+'__'+slugInd(nome).slice(0,40)+'_'+ano+'_'+rand4();
      obj.id=id;
      if(isJog) result.ind_jog[id]=obj; else result.ind_tre[id]=obj;
    }
  });
  return result;
}

function importIndicadosHistorico(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const jog=data.ind_jog||data;
      const tre=data.ind_tre||{};
      const totalJ=Object.keys(jog).length;
      const totalT=Object.keys(tre).length;
      if(!confirm('Importar '+totalJ+' jogadores e '+totalT+' treinadores?\nIsso VAI SOBRESCREVER dados existentes com mesma ID.')) return;
      
      // Batch write to Firebase
      if(db&&firebaseReady){
        setSyncBadge('syncing','⟳ Importando…');
        const updates={};
        Object.entries(jog).forEach(([k,v])=>{ updates['ind_jog/'+k]=v; });
        Object.entries(tre).forEach(([k,v])=>{ updates['ind_tre/'+k]=v; });
        db.ref('/').update(updates)
          .then(()=>{
            setSyncBadge('synced','● Live');
            alert('✓ Importado: '+totalJ+' jogadores e '+totalT+' treinadores');
          })
          .catch(err=>{ setSyncBadge('error','✕ Erro'); alert('Erro: '+err.message); });
      } else {
        // Local fallback
        Object.assign(IND_JOG, jog);
        Object.assign(IND_TRE, tre);
        try{
          localStorage.setItem('ind_jog',JSON.stringify(IND_JOG));
          localStorage.setItem('ind_tre',JSON.stringify(IND_TRE));
        }catch(e){}
        alert('✓ Importado localmente: '+totalJ+' jogadores e '+totalT+' treinadores');
        if(currentView==='indicados') document.getElementById('views').innerHTML=renderIndicados();
      }
    }catch(err){ alert('Erro ao ler arquivo: '+err.message); }
    input.value='';
  };
  reader.readAsText(file);
}


function dateFromRecord(obj){
  try{
    const s=obj.data||'';
    const m=String(s).match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
    if(!m) return null;
    const d=parseInt(m[1]),mo=parseInt(m[2]);
    let y=m[3]?parseInt(m[3]):(parseInt(obj.ano)||null);
    if(y && y<100) y+=2000;
    if(!y||!d||!mo||mo<1||mo>12||d<1||d>31) return null;
    const dt=new Date(y,mo-1,d);
    if(isNaN(dt.getTime())||dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d) return null;
    return dt;
  }catch(e){return null;}
}

function importIndicadosSomenteNovos(input){
  const file=input.files[0]; if(!file) return;
  const isExcel=/\.(xlsx|xls)$/i.test(file.name);
  // Para Excel, pergunta data mínima (corte opcional)
  let minDate=null;
  if(isExcel){
    const minStr=prompt('Importar apenas linhas com data ≥ (DD/MM/AAAA):\n(deixe vazio para importar todas)','13/03/2026');
    if(minStr===null){input.value='';return;}
    if(minStr.trim()){
      const m=minStr.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(!m){alert('Data inválida. Use DD/MM/AAAA.');input.value='';return;}
      minDate=new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
    }
  }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let jog={}, tre={}, nJ, nT, skipJ, skipT, novosJ, novosT;
      if(isExcel){
        if(typeof XLSX==='undefined'){alert('Biblioteca Excel não carregou. Verifique conexão e recarregue a página.');input.value='';return;}
        const parsed=parseIndicadosExcel(e.target.result);
        jog=parsed.ind_jog; tre=parsed.ind_tre;
        // Filtro por data mínima (se informada)
        if(minDate){
          jog=Object.fromEntries(Object.entries(jog).filter(([,v])=>{const d=dateFromRecord(v);return d&&d>=minDate;}));
          tre=Object.fromEntries(Object.entries(tre).filter(([,v])=>{const d=dateFromRecord(v);return d&&d>=minDate;}));
        }
        // Dedup por conteúdo: nome+ano+data+indicação
        const keyOf=o=>slugInd(o.nome)+'|'+(o.ano||'')+'|'+(o.data||'')+'|'+slugInd(o.indicacao||'');
        const existingJ=new Set(Object.values(IND_JOG||{}).map(keyOf));
        const existingT=new Set(Object.values(IND_TRE||{}).map(keyOf));
        novosJ=Object.fromEntries(Object.entries(jog).filter(([,v])=>!existingJ.has(keyOf(v))));
        novosT=Object.fromEntries(Object.entries(tre).filter(([,v])=>!existingT.has(keyOf(v))));
      } else {
        const data=JSON.parse(e.target.result);
        jog=data.ind_jog||data;
        tre=data.ind_tre||{};
        novosJ=Object.fromEntries(Object.entries(jog).filter(([k])=>!IND_JOG[k]));
        novosT=Object.fromEntries(Object.entries(tre).filter(([k])=>!IND_TRE[k]));
      }
      nJ=Object.keys(novosJ).length; nT=Object.keys(novosT).length;
      skipJ=Object.keys(jog).length-nJ; skipT=Object.keys(tre).length-nT;
      if(nJ+nT===0){alert(`Nenhum registro novo encontrado.\n${skipJ+skipT} já existiam e foram ignorados.`);input.value='';return;}
      const tipoFonte=isExcel?'Excel':'JSON';
      if(!confirm(`Fonte: ${tipoFonte}\nImportar ${nJ} jogador(es) e ${nT} treinador(es) novos?\n${skipJ+skipT} já existiam → serão IGNORADOS.`)){input.value='';return;}
      if(db&&firebaseReady){
        setSyncBadge('syncing','⟳ Importando…');
        const updates={};
        Object.entries(novosJ).forEach(([k,v])=>{updates['ind_jog/'+k]=v;});
        Object.entries(novosT).forEach(([k,v])=>{updates['ind_tre/'+k]=v;});
        db.ref('/').update(updates)
          .then(()=>{ setSyncBadge('synced','● Live'); alert(`✓ Adicionados: ${nJ} jogadores e ${nT} treinadores\nIgnorados (já existiam): ${skipJ+skipT}`); })
          .catch(err=>{ setSyncBadge('error','✕ Erro'); alert('Erro: '+err.message); });
      } else {
        Object.assign(IND_JOG,novosJ); Object.assign(IND_TRE,novosT);
        try{localStorage.setItem('ind_jog',JSON.stringify(IND_JOG));localStorage.setItem('ind_tre',JSON.stringify(IND_TRE));}catch(e){}
        alert(`✓ Adicionados localmente: ${nJ} jogadores\nIgnorados: ${skipJ+skipT}`);
        if(currentView==='indicados') document.getElementById('views').innerHTML=renderIndicados();
      }
    }catch(err){alert('Erro ao ler arquivo: '+err.message); console.error(err);}
    input.value='';
  };
  if(isExcel) reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
}


/* ══ OGOL AUTO-FILL ══ */
async function buscarOgol(){
  const url = document.getElementById('iOgolLink')?.value?.trim();
  if(!url){ alert('Cole o link do Ogol primeiro.'); return; }

  const btn = document.getElementById('btnOgolBuscar');
  btn.textContent='⟳ Buscando…';
  btn.disabled=true;

  // Extract slug from Ogol URL → player name for search
  // e.g. /jogador/vinicius-junior/547737 → "vinicius junior"
  const slugMatch = url.match(/ogol\.com\.br\/jogador\/([^/]+)/);
  const slug = slugMatch ? slugMatch[1].replace(/-/g,' ') : '';
  if(!slug){ alert('URL do Ogol não reconhecida.'); btn.textContent='🔍 Buscar Ogol'; btn.disabled=false; return; }

  try{
    // TheSportsDB — free, no key, CORS enabled
    const searchName = encodeURIComponent(slug);
    const apiUrl = 'https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p='+searchName;
    const res = await fetch(apiUrl);
    const data = await res.json();
    const p = data?.player?.[0];

    if(p){
      // Map TheSportsDB position to our codes
      const posMap={
        'Goalkeeper':'1 - GK','Defender':'4 - RCB/LCB',
        'Right Back':'2 - RB','Left Back':'3 - LB',
        'Midfielder':'6 - CM','Defensive Midfielder':'5 - DM',
        'Attacking Midfielder':'7 - AM','Forward':'9 - CF',
        'Winger':'8 - RW/LW','Centre-Forward':'9 - CF',
        'Striker':'9 - CF'
      };
      const posCode = posMap[p.strPosition] || '';

      if(p.strPlayer)    document.getElementById('iNome').value = p.strPlayer.toUpperCase();
      if(p.dateBorn)     document.getElementById('iGeracao').value = p.dateBorn.slice(0,4);
      if(p.strNationality) document.getElementById('iPais').value = p.strNationality;
      if(p.strTeam)      document.getElementById('iClube').value = p.strTeam;
      if(p.strHeight)    {} // optional
      if(posCode){
        const sel = document.getElementById('iPosicao');
        if(sel) sel.value = posCode;
      }

      btn.textContent='✓ Preenchido!';
      btn.style.background='#1a8040';
      setTimeout(()=>{ btn.textContent='🔍 Buscar Ogol'; btn.style.background=''; btn.disabled=false; }, 3000);
    } else {
      // Fallback: pre-fill name from URL slug at minimum
      const nameFmt = slug.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      document.getElementById('iNome').value = nameFmt.toUpperCase();

      btn.textContent='⚠ Não encontrado — nome preenchido';
      btn.style.background='#b8860b';
      setTimeout(()=>{ btn.textContent='🔍 Buscar Ogol'; btn.style.background=''; btn.disabled=false; }, 3500);
    }
  } catch(err){
    console.error('buscarOgol error:', err);
    // Fallback: at least fill the name from the URL
    try{
      const nameFmt = slug.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      document.getElementById('iNome').value = nameFmt.toUpperCase();
    }catch(e){}
    btn.textContent='⚠ API indisponível — nome preenchido';
    btn.style.background='#b8860b';
    setTimeout(()=>{ btn.textContent='🔍 Buscar Ogol'; btn.style.background=''; btn.disabled=false; }, 3500);
  }
}

function fixIndHeight(){
  const nav=document.querySelector('.nav');
  const toolbar=document.querySelector('.toolbar');
  const indTabs=document.querySelector('.ind-tabs');
  const ctrlWrap=document.getElementById('indControls');
  const tblWrap=document.getElementById('indTableWrap');
  if(!nav||!toolbar||!indTabs||!tblWrap) return;
  const navH=nav.getBoundingClientRect().height;
  const toolH=toolbar.getBoundingClientRect().height;
  const tabsH=indTabs.getBoundingClientRect().height;
  const ctrlH=ctrlWrap?ctrlWrap.getBoundingClientRect().height:0;
  tblWrap.style.height=(window.innerHeight - navH - toolH - tabsH - ctrlH - 2)+'px';
  tblWrap.style.overflow='auto';
}

/* ══════════════════════════════════════════
   QTS — AGENDA SEMANAL
══════════════════════════════════════════ */
let QTS={};           // { weekId: { scout: { day: { manha:'', tarde:'' } } } }
let qtsWeekOffset=0;  // 0 = current week, -1 = last week, etc.
let qtsPopupEl=null;

// Get Monday of a week offset from today
function qtsGetMonday(offset){
  const d=new Date();
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff + offset*7);
  d.setHours(0,0,0,0);
  return d;
}

function qtsWeekId(monday){
  const pad=n=>String(n).padStart(2,'0');
  const d1=monday;
  const d2=new Date(monday); d2.setDate(d2.getDate()+6);
  return `${pad(d1.getDate())}${pad(d1.getMonth()+1)}-${pad(d2.getDate())}${pad(d2.getMonth()+1)}_${d2.getFullYear()}`;
}

function qtsWeekLabel(monday){
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const d2=new Date(monday); d2.setDate(d2.getDate()+6);
  if(monday.getMonth()===d2.getMonth())
    return `${monday.getDate()} – ${d2.getDate()} ${months[d2.getMonth()]} ${d2.getFullYear()}`;
  return `${monday.getDate()} ${months[monday.getMonth()]} – ${d2.getDate()} ${months[d2.getMonth()]} ${d2.getFullYear()}`;
}

function saveQtsEntry(weekId,scout,day,period,val){
  if(!QTS[weekId]) QTS[weekId]={};
  if(!QTS[weekId][scout]) QTS[weekId][scout]={};
  if(!QTS[weekId][scout][day]) QTS[weekId][scout][day]={manha:'',tarde:''};
  QTS[weekId][scout][day][period]=val;
  if(db&&firebaseReady){
    const path=`qts/${weekId}/${scout}/${day}/${period}`;
    db.ref(path).set(val)
      .then(()=>setSyncBadge('synced','● Live'))
      .catch(e=>setSyncBadge('error','✕ Save failed'));
  } else {
    try{localStorage.setItem('qts',JSON.stringify(QTS));}catch(e){}
  }
}

function renderQts(scout){
  const monday=qtsGetMonday(qtsWeekOffset);
  const weekId=qtsWeekId(monday);
  const label=qtsWeekLabel(monday);
  const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const weekData=(QTS[weekId]&&QTS[weekId][scout])||{};

  // Build day headers
  const dayHdrs=DAYS.map((d,i)=>{
    const dt=new Date(monday); dt.setDate(dt.getDate()+i);
    const isSun=i===6;
    const isSat=i===5;
    const bg=isSun?'background:#1a1a18':isSat?'background:#333330':'';
    return `<div class="qts-cell qts-day-hdr" style="${bg}">${d}<br><span style="font-size:8px;opacity:.6;font-weight:400">${dt.getDate()}</span></div>`;
  }).join('');

  // Build rows for manha and tarde
  function buildRow(period, label){
    const cells=DAYS.map((_,i)=>{
      const entry=weekData[i]&&weekData[i][period]||'';
      const isEmpty=!entry.trim();
      return `<div class="qts-cell qts-entry${isEmpty?' empty':''}" 
        onclick="openQtsPopup(event,'${weekId}','${scout}',${i},'${period}')"
        data-wid="${weekId}" data-scout="${scout}" data-day="${i}" data-period="${period}">${isEmpty?'+ adicionar':entry}</div>`;
    }).join('');
    return `<div class="qts-cell qts-period-lbl">${label}</div>${cells}`;
  }

  return `
    <div class="qts-wrap" id="qts-${scout}">
      <div class="qts-header">
        <span class="qts-title">📅 QTS — Agenda Semanal</span>
        <div class="qts-nav">
          <button class="qts-nav-btn" onclick="qtsNav('${scout}',-1)">◀</button>
          <span class="qts-week-label">${label}</span>
          <button class="qts-nav-btn" onclick="qtsNav('${scout}',1)">▶</button>
          <button class="qts-nav-btn" onclick="qtsGoToday('${scout}')" style="font-size:10px;padding:3px 8px">Hoje</button>
        </div>
      </div>
      <div class="qts-grid">
        <div class="qts-cell qts-corner"></div>
        ${dayHdrs}
        ${buildRow('manha','Manhã')}
        ${buildRow('tarde','Tarde')}
      </div>
    </div>`;
}

function qtsNav(scout,dir){
  qtsWeekOffset+=dir;
  const el=document.getElementById('qts-'+scout);
  if(el){
    const monday=qtsGetMonday(qtsWeekOffset);
    const weekId=qtsWeekId(monday);
    // Load from Firebase if not cached
    if(db&&firebaseReady&&!QTS[weekId]){
      db.ref('qts/'+weekId).once('value',snap=>{
        QTS[weekId]=snap.val()||{};
        el.outerHTML=renderQts(scout);
      });
    } else {
      el.outerHTML=renderQts(scout);
    }
  }
}

function qtsGoToday(scout){
  qtsWeekOffset=0;
  const el=document.getElementById('qts-'+scout);
  if(el) el.outerHTML=renderQts(scout);
}

function openQtsPopup(e,weekId,scout,day,period){
  e.stopPropagation();
  closeQtsPopup();

  const existing=QTS[weekId]&&QTS[weekId][scout]&&QTS[weekId][scout][day]&&QTS[weekId][scout][day][period]||'';
  const rect=e.currentTarget.getBoundingClientRect();

  qtsPopupEl=document.createElement('div');
  qtsPopupEl.className='qts-popup';

  // Position popup
  let top=rect.bottom+6+window.scrollY;
  let left=rect.left+window.scrollX;
  if(left+280>window.innerWidth) left=window.innerWidth-290;
  if(top+200>window.innerHeight+window.scrollY) top=rect.top-210+window.scrollY;
  qtsPopupEl.style.top=top+'px';
  qtsPopupEl.style.left=left+'px';

  const DAYS_FULL=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
  const periodLabel=period==='manha'?'Manhã':'Tarde';

  qtsPopupEl.innerHTML=`
    <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#5a6278;margin-bottom:6px">${DAYS_FULL[day]} · ${periodLabel}</div>
    <textarea id="qtsTa" placeholder="Jogo, reunião, tarefa…" autofocus>${existing}</textarea>
    <div class="qts-popup-actions">
      ${existing?`<button class="qts-popup-btn qts-popup-del" onclick="saveQtsPopup('${weekId}','${scout}',${day},'${period}',true)">Limpar</button>`:''}
      <button class="qts-popup-btn qts-popup-cancel" onclick="closeQtsPopup()">Cancelar</button>
      <button class="qts-popup-btn qts-popup-save" onclick="saveQtsPopup('${weekId}','${scout}',${day},'${period}',false)">Salvar ✓</button>
    </div>`;

  document.body.appendChild(qtsPopupEl);
  setTimeout(()=>document.getElementById('qtsTa')?.focus(),50);

  // Close on outside click
  setTimeout(()=>document.addEventListener('click',closeQtsPopup,{once:true}),100);
}

function saveQtsPopup(weekId,scout,day,period,clear){
  const val=clear?'':(document.getElementById('qtsTa')?.value||'');
  saveQtsEntry(weekId,scout,day,period,val);
  closeQtsPopup();
  // Refresh the QTS grid
  const el=document.getElementById('qts-'+scout);
  if(el) el.outerHTML=renderQts(scout);
}

function closeQtsPopup(){
  if(qtsPopupEl){qtsPopupEl.remove();qtsPopupEl=null;}
}

// Load QTS for current week from Firebase on first load
function initQts(){
  if(!db||!firebaseReady) {
    try{const s=localStorage.getItem('qts');if(s)QTS=JSON.parse(s);}catch(e){}
    return;
  }
  const monday=qtsGetMonday(0);
  const weekId=qtsWeekId(monday);
  db.ref('qts').on('value',snap=>{
    QTS=snap.val()||{};
    // Sincronizar localStorage
    try{localStorage.setItem('qts',JSON.stringify(QTS));}catch(e){}
    // If scout view is open, refresh QTS grid
    if(currentView.startsWith('scout_')){
      const scout=currentView.replace('scout_','');
      const el=document.getElementById('qts-'+scout);
      if(el) el.outerHTML=renderQts(scout);
    }
  });
}

/* ── Ogol auto-fill ── */
async function prBuscarOgol(){
  const url = document.getElementById('pr_ogolLink')?.value?.trim();
  if(!url){alert('Cole o link do Ogol primeiro.');return;}
  const btn=document.getElementById('prOgolBtn');
  btn.textContent='⟳';btn.disabled=true;
  const slugMatch=url.match(/ogol\.com\.br\/jogador\/([^/]+)/);
  const slug=slugMatch?slugMatch[1].replace(/-/g,' '):'';
  try{
    const res=await fetch('https://www.thesportsdb.com/api/v1/json/3/searchplayers.php?p='+encodeURIComponent(slug));
    const d=await res.json();
    const p=d?.player?.[0];
    if(p){
      if(p.strPlayer) { PR.nome=p.strPlayer.toUpperCase(); const n=document.getElementById('pr_nome'); if(n) n.value=PR.nome; }
      if(p.strNationality) { PR.pais=p.strNationality; const n=document.getElementById('pr_pais'); if(n) n.value=PR.pais; }
      if(p.strTeam) { PR.clube=p.strTeam; const n=document.getElementById('pr_clube'); if(n) n.value=PR.clube; }
      if(p.dateBorn) { PR.ano=p.dateBorn.slice(0,4); const n=document.getElementById('pr_ano'); if(n) n.value=PR.ano; }
    } else {
      const n=document.getElementById('pr_nome');
      if(n) n.value=slug.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ').toUpperCase();
    }
    PR.ogolLink=url;
    btn.textContent='✓';btn.style.background='#1a8040';
    setTimeout(()=>{btn.textContent='🔍';btn.style.background='';btn.disabled=false;},2000);
  }catch(e){
    btn.textContent='✕';btn.style.background='#c00';
    setTimeout(()=>{btn.textContent='🔍';btn.style.background='';btn.disabled=false;},2000);
  }
}

/* ── Platform player search ── */
function prSearchPlayers(q){
  const el=document.getElementById('prSearchResults');
  if(!el) return;
  if(!q||q.length<2){el.style.display='none';el.innerHTML='';return;}
  const ql=q.toLowerCase();
  const found=[];
  Object.values(IND_JOG).forEach(r=>{
    if((r.nome||'').toLowerCase().includes(ql)) found.push({...r,_src:'Indicados'});
  });
  if(!found.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=found.slice(0,6).map(r=>`
    <div onclick='prLoadFromPlayer(${JSON.stringify(r).replace(/'/g,"\\'")})'
      style="padding:7px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0eeea;display:flex;justify-content:space-between">
      <span><strong>${r.nome||'—'}</strong> <span style="color:#888;font-size:10px">${r.posicao||''} · ${r.clube||''}</span></span>
      <span style="font-size:10px;color:#aaa">${r._src}</span>
    </div>`).join('');
}
function prLoadFromPlayer(r){
  PR.nome=r.nome||''; PR.posicao=r.posicao||''; PR.clube=r.clube||'';
  PR.pais=r.pais||''; PR.ano=r.geracao||''; PR.pe=r.pe||''; PR.alt=r.alt||'';
  PR.ogolLink=r.ogolLink||''; PR.tmLink=r.tmLink||''; PR.besoccerLink=r.besoccerLink||'';
  document.getElementById('prSearchResults').style.display='none';
  renderPrStep();
}

/* ── Image helpers ── */
function prReadFile(file){ return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);}); }
async function prSetImg(input,key){
  const b64=await prReadFile(input.files[0]);
  PR[key]=b64; renderPrStep();
}
async function prAddImgs(input,key){
  for(const f of Array.from(input.files)){
    const b64=await prReadFile(f);
    if(!PR[key]) PR[key]=[];
    PR[key].push(b64);
  }
  renderPrStep();
}
function prRemoveImg(key,idx){
  if(idx===undefined) PR[key]=null;
  else PR[key].splice(idx,1);
  renderPrStep();
}

          `<div style="display:flex;gap:.5rem;flex-wrap:wrap">

/* ══════════════════════════════════════════
   COVER PAGE — Canvas renderer
   Static bg + dynamic name/subtitle/photo
   Uses Barlow Condensed (≈ DIN Condensed)
══════════════════════════════════════════ */
async function renderCoverCanvas(PR){
  await document.fonts.ready;

  // Slide dimensions: 1456×816px (Keynote 3x export aspect ≈ 16:9)
  // We work in the same px space then export as JPEG for jsPDF (297×167mm)
  const W = 1456, H = 816;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── 1. Draw the static background image (logo, wings, badges, PLAYER REPORT) ──
  await new Promise(res => {
    const bg = new Image();
    bg.onload = () => { ctx.drawImage(bg, 0, 0, W, H); res(); };
    bg.onerror = () => {
      ctx.fillStyle = '#ededed';
      ctx.fillRect(0, 0, W, H);
      res();
    };
    bg.src = COVER_BG;
  });

  // ── 2. Player name — DIN Condensed style (Barlow Condensed 900 italic) ──
  // Canvas: 1456×816px (≈ 297×167mm at ~4.9px/mm)
  // Keynote reference: name ~65% slide width, baseline at ~y=77% of slide height
  const name = (PR.nome || '').toUpperCase();
  if(name){
    // Start at 80px (~16pt effective), scale down to fit 65% width
    let fontSize = 48;
    ctx.font = `italic 900 ${fontSize}px "Barlow Condensed"`;
    // Target: name fits in 65% of canvas width
    while(ctx.measureText(name).width > W * 0.55 && fontSize > 20){
      fontSize -= 2;
      ctx.font = `italic 900 ${fontSize}px "Barlow Condensed"`;
    }
    ctx.fillStyle = '#1a1a18';
    ctx.textAlign = 'center';
    const nameY = Math.round(H * 0.83);   // moved lower
    ctx.fillText(name, W / 2, nameY);
    // Underline
    const nameW = ctx.measureText(name).width;
    ctx.strokeStyle = '#1a1a18';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2 - nameW/2, nameY + 4);
    ctx.lineTo(W/2 + nameW/2, nameY + 4);
    ctx.stroke();
  }

  // ── 3. Subtitle: Posição | Clube | (País) — ~28pt ──
  const sub = [PR.posicao, PR.clube, PR.pais ? `(${PR.pais})` : ''].filter(Boolean).join('  |  ');
  if(sub){
    ctx.font = `700 30px "Barlow Condensed"`;
    ctx.fillStyle = '#3a3835';
    ctx.textAlign = 'center';
    ctx.fillText(sub, W / 2, Math.round(H * 0.91));  // moved lower
  }

  return canvas.toDataURL('image/jpeg', 0.96);
}

/* ══════════════════════════════════════════
   SHARED PANEL HELPERS
══════════════════════════════════════════ */
function panelBase(canvasW, canvasH, title){
  const cv = document.createElement('canvas');
  cv.width = canvasW; cv.height = canvasH;
  const c  = cv.getContext('2d');
  // background
  c.fillStyle = '#e8e4e0'; c.fillRect(0,0,canvasW,canvasH);
  // header
  const hh = Math.round(canvasH * 0.195);
  c.fillStyle = '#3d3a37';
  c.beginPath(); c.roundRect(0,0,canvasW,hh,[3,3,0,0]); c.fill();
  // header text
  const hfs = Math.round(hh * 0.50);
  c.font = `700 ${hfs}px "Barlow Condensed"`;
  c.fillStyle = '#e8c84a'; c.textAlign = 'left';
  c.fillText(title, Math.round(canvasW*0.06), hh*0.74);
  return {cv, c, hh};
}

function drawPill(c, cx, y, w, h, label){
  const r = h*0.46;
  c.fillStyle = '#946c52';
  c.beginPath(); c.roundRect(cx-w/2,y,w,h,r); c.fill();
  c.font = `700 ${Math.round(h*0.62)}px "Barlow Condensed"`;
  c.fillStyle = '#fff'; c.textAlign = 'center';
  c.fillText(label, cx, y+h*0.72);
}

/* ══════════════════════════════════════════
   PLAYING POSITIONS — Canvas renderer
══════════════════════════════════════════ */
async function renderPPCanvas(PR, canvasW, canvasH){
  await document.fonts.ready;
  const {cv,c,hh} = panelBase(canvasW, canvasH, 'Playing Positions');

  // Field area: left 46% of panel, with small margin
  const fx = canvasW*0.020, fy = hh + canvasH*0.030;
  const fw = canvasW*0.430, fh = canvasH - fy - canvasH*0.030;

  // Field background
  c.fillStyle = '#dedad6';
  c.beginPath(); c.roundRect(fx,fy,fw,fh,3); c.fill();

  // Field markings
  c.strokeStyle = '#c8c4c0'; c.lineWidth = Math.max(1, canvasW*0.007);
  // Center circle
  const mCx = fx+fw/2, mCy = fy+fh*0.50;
  c.beginPath(); c.arc(mCx, mCy, fw*0.18, 0, Math.PI*2); c.stroke();
  // Center line
  c.beginPath(); c.moveTo(fx, mCy); c.lineTo(fx+fw, mCy); c.stroke();
  // Penalty areas
  const paW = fw*0.60, paH = fh*0.18;
  c.beginPath(); c.rect(fx+(fw-paW)/2, fy, paW, paH); c.stroke();
  c.beginPath(); c.rect(fx+(fw-paW)/2, fy+fh-paH, paW, paH); c.stroke();
  // Center dot
  c.fillStyle = '#b8b4b0';
  c.beginPath(); c.arc(mCx, mCy, canvasW*0.012, 0, Math.PI*2); c.fill();

  // ── Dot positions (normalized within field) ──
  // 4-3-3 formation base positions (also used for dot display)
  const allDots = [
    ['CF',  0.50, 0.085],
    ['LW',  0.18, 0.200],['RW', 0.82, 0.200],
    ['LCM', 0.22, 0.420],['CM', 0.50, 0.370],['RCM',0.78, 0.420],
    ['LB',  0.14, 0.680],['LCB',0.36, 0.730],['RCB',0.64, 0.730],['RB', 0.86, 0.680],
    ['GK',  0.50, 0.920],
  ];

  const posToKey = raw => {
    if(!raw) return null;
    const r = raw.toUpperCase();
    if(r.match(/GK|GOAL/))       return 'GK';
    if(r.match(/\bRB\b|RIGHT.*BACK/)) return 'RB';
    if(r.match(/\bLB\b|LEFT.*BACK/))  return 'LB';
    if(r.match(/\bCB\b|CENT.*BACK/))  return 'CB';
    if(r.match(/CDM|DM|DEF.*MID/))    return 'DM';
    if(r.match(/CAM|AM|ATT.*MID/))    return 'AM';
    if(r.match(/\bCM\b|MID/))         return 'CM';
    if(r.match(/\bLW\b|LEFT.*WING/))  return 'LW';
    if(r.match(/\bRW\b|RIGHT.*WING/)) return 'RW';
    if(r.match(/CF|ST|STRIKER|FORWARD/)) return 'CF';
    return 'CF';
  };

  const key1 = posToKey(PR.posicao);
  const key2 = posToKey(PR.posicao2);
  const dotMap = Object.fromEntries(allDots.map(([k,x,y])=>[k,[x,y]]));
  const dotR   = Math.max(4, fw*0.080);

  // Gray dots for all positions
  allDots.forEach(([k,nx,ny])=>{
    const dx = fx + nx*fw, dy = fy + ny*fh;
    c.fillStyle = '#a8a4a0';
    c.beginPath(); c.arc(dx,dy,dotR*0.72,0,Math.PI*2); c.fill();
  });

  // Active dots
  if(key2 && dotMap[key2]){
    const [nx,ny] = dotMap[key2];
    c.fillStyle = '#946c52';
    c.beginPath(); c.arc(fx+nx*fw, fy+ny*fh, dotR, 0, Math.PI*2); c.fill();
  }
  if(key1 && dotMap[key1]){
    const [nx,ny] = dotMap[key1];
    c.fillStyle = '#8c5468';
    c.beginPath(); c.arc(fx+nx*fw, fy+ny*fh, dotR*1.12, 0, Math.PI*2); c.fill();
  }

  // ── Label pills (right side) ──
  const labX = fx + fw + canvasW*0.04;
  const labW = canvasW - labX - canvasW*0.025;
  const capFS = Math.round(canvasH * 0.060);
  const pH    = Math.round(canvasH * 0.115);
  let labY    = fy + fh*0.04;

  const drawLabel = (num, pos, col) => {
    if(!pos) return;
    const short = pos.split(/[-–]/)[0].trim();
    const label = short.length > 13 ? short.slice(0,12)+'…' : short;
    c.font = `400 ${capFS}px "Barlow Condensed"`;
    c.fillStyle = '#7a7470'; c.textAlign = 'left';
    c.fillText('Main '+num, labX, labY + capFS*0.85);
    labY += Math.round(capFS*1.10);
    c.fillStyle = col;
    c.beginPath(); c.roundRect(labX, labY, labW, pH, pH*0.40); c.fill();
    c.font = `700 ${Math.round(pH*0.58)}px "Barlow Condensed"`;
    c.fillStyle = '#fff'; c.textAlign = 'center';
    c.fillText(label, labX+labW/2, labY+pH*0.70);
    labY += pH + Math.round(canvasH*0.040);
  };

  drawLabel(1, PR.posicao,  '#8c5468');
  drawLabel(2, PR.posicao2, '#946c52');

  return cv.toDataURL('image/jpeg', 0.95);
}

/* ══════════════════════════════════════════
   HEIGHT — Canvas renderer
══════════════════════════════════════════ */
async function renderHeightCanvas(PR, canvasW, canvasH){
  await document.fonts.ready;
  const {cv,c,hh} = panelBase(canvasW, canvasH, 'Height');
  const RUL='#a09890', NUM='#5a4a38', UNI='#9a9490';

  const top=hh+canvasH*0.04, bot=canvasH*0.94;
  const figH=bot-top, figCx=canvasW*0.32, figTop=top;

  // Draw person silhouette from SVG
  await new Promise(res=>{
    const img=new Image(); img.onload=()=>{
      const sw=figH*0.52*1.05, sh=figH*1.44;  // +44% taller total
      c.drawImage(img, figCx-sw/2, figTop, sw, sh);
      res();
    }; img.onerror=res; img.src=PERSON_SVG;
  });

  const floorY=bot + (canvasH*0.94-hh-canvasH*0.04)*0.10;  // extended for taller figure

  // Ruler
  const lx=canvasW*0.64, span=floorY-figTop;
  const asz=Math.max(4,span*0.060), lw2=Math.max(1.5,canvasW*0.018);
  c.strokeStyle=RUL; c.lineWidth=lw2; c.lineCap='round';
  c.beginPath(); c.moveTo(lx,figTop+asz); c.lineTo(lx,floorY-asz); c.stroke();
  c.beginPath(); c.moveTo(lx-asz*0.6,figTop+asz); c.lineTo(lx,figTop); c.lineTo(lx+asz*0.6,figTop+asz); c.stroke();
  c.beginPath(); c.moveTo(lx-asz*0.6,floorY-asz); c.lineTo(lx,floorY); c.lineTo(lx+asz*0.6,floorY-asz); c.stroke();
  c.lineWidth=lw2*0.55;
  c.beginPath(); c.moveTo(lx-asz,figTop); c.lineTo(lx+asz,figTop); c.stroke();
  c.beginPath(); c.moveTo(lx-asz,floorY); c.lineTo(lx+asz,floorY); c.stroke();

  // Value
  const cm=parseInt(PR.alt||PR.altura||'')||null;
  const vx=lx+canvasW*0.07, mid=figTop+span*0.36;
  const nfs=Math.round(canvasH*0.165), ufs=Math.round(nfs*0.50);
  c.textAlign='left';
  c.fillStyle=NUM; c.font=`800 ${nfs}px "Barlow Condensed"`;
  c.fillText(cm?String(cm):'—', vx, mid);
  c.fillStyle=UNI; c.font=`600 ${ufs}px "Barlow Condensed"`;
  c.fillText('cm', vx, mid+ufs*1.25);

  return cv.toDataURL('image/jpeg',0.95);
}

async function renderSFCanvas(PR, canvasW, canvasH){
  await document.fonts.ready;
  const {cv,c,hh} = panelBase(canvasW, canvasH, 'Strong Foot');

  const sf=(PR.pe||PR.pePreferido||'').toLowerCase();
  const isLeft=sf.includes('left')||sf.includes('esq');
  const isBoth=sf==='both'||sf==='ambos';
  const isRight=!isLeft&&!isBoth;

  // Reserve pill
  const pH=Math.round(canvasH*0.105), pMg=Math.round(canvasH*0.038);
  const pY=canvasH-pH-pMg;

  // Foot area (between header and pill)
  const aTop=hh+canvasH*0.015, aBot=pY-canvasH*0.015;
  const aH=aBot-aTop;

  // Each foot: image ratio is 0.50 (width = height/2)
  // Constrain so both feet fit side by side with a gap
  const maxFW = canvasW*0.44;          // max foot width = 44% of panel
  const maxFH = aH*0.92;               // max foot height = 92% of area
  // Maintain ratio 0.50: fw = fh * 0.50
  let fh = Math.min(maxFH, maxFW / 0.50);
  let fw = fh * 0.50;
  // Vertical center
  const fTop = aTop + (aH - fh) / 2;

  // Draw foot helper: draws gray PNG, tints dark if active using offscreen canvas
  const drawFootImg = (src, x, y, w2, h2, active) => new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      if(!active){
        // Gray foot: draw as-is
        c.drawImage(img, x, y, w2, h2);
      } else {
        // Dark foot: use offscreen canvas to tint gray→dark
        const oc=document.createElement('canvas');
        oc.width=Math.round(w2); oc.height=Math.round(h2);
        const oc2=oc.getContext('2d');
        // 1. Draw gray foot
        oc2.drawImage(img, 0, 0, oc.width, oc.height);
        // 2. Overlay dark color using 'source-atop' (only where foot pixels exist)
        oc2.globalCompositeOperation='source-atop';
        oc2.fillStyle='#1e140c';
        oc2.fillRect(0, 0, oc.width, oc.height);
        // 3. Draw result onto main canvas
        c.drawImage(oc, x, y, w2, h2);
      }
      res();
    };
    img.onerror=res; img.src=src;
  });

  const leftActive  = isLeft||isBoth;
  const rightActive = isRight||isBoth;

  // Left foot centered at 25% of panel
  const lfX = canvasW*0.25 - fw/2;
  await drawFootImg(FOOT_LEFT_GRAY,  lfX, fTop, fw, fh, leftActive);

  // Right foot centered at 75% of panel
  const rfX = canvasW*0.75 - fw/2;
  await drawFootImg(FOOT_RIGHT_GRAY, rfX, fTop, fw, fh, rightActive);

  // Pill
  const label=isBoth?'Both':(isLeft?'Left':'Right');
  drawPill(c, canvasW*0.50, pY, canvasW*0.72, pH, label);

  return cv.toDataURL('image/jpeg',0.95);
}

    const vidRows=[['Highlights',PR.videoHighlights],['Offensive Actions',PR.videoOffensive],['Defensive Actions',PR.videoDefensive]];
    vidRows.forEach(([lbl,url],i)=>{
      const vy=y5L+5+i*8;
      pdf.setFont('helvetica','bold');pdf.setFontSize(EF.fontSm);pdf.setTextColor(...EF.mid);
      pdf.text(lbl,LC5+3,vy);
      if(url){
        pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontXs);pdf.setTextColor(60,130,210);
        const shortened=url.length>50?url.slice(0,48)+'…':url;
        pdf.text(shortened,LC5+3,vy+3.5);
      }
    });
    y5L+=30;

    // Scouting History
    secBar(LC5,y5L,LC5W,7,'Scouting History');y5L+=8;
    pdf.setFillColor(...EF.contentBg);pdf.roundedRect(LC5,y5L,LC5W,12,0.5,0.5,'F');
    if(PR.scoutingHistory){
      pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontSm);pdf.setTextColor(60,130,210);
      pdf.text(PR.scoutingHistory.slice(0,80),LC5+3,y5L+7);
    }
    y5L+=14;

    // Relevant News
    secBar(LC5,y5L,LC5W,7,'Relevant News');y5L+=8;
    const newsH=H-y5L-30;
    pdf.setFillColor(...EF.contentBg);pdf.roundedRect(LC5,y5L,LC5W,newsH,0.5,0.5,'F');
    pdf.setFillColor(55,55,53);pdf.rect(LC5,y5L,LC5W,6,'F');
    pdf.setFont('helvetica','bold');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.white);
    pdf.text('Headline',LC5+3,y5L+4.2);
    pdf.text('Link',LC5+LC5W*0.6,y5L+4.2);
    let ny=y5L+8;
    PR.news.filter(n=>n.headline).forEach((n,i)=>{
      if(ny>y5L+newsH-4) return;
      if(i%2===0){pdf.setFillColor(240,240,238);pdf.rect(LC5,ny-2,LC5W,5.5,'F');}
      pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.dark);pdf.setCharSpace(0);
      pdf.text((n.headline||'').slice(0,45),LC5+2,ny+2);
      if(n.link){pdf.setTextColor(60,130,210);pdf.setCharSpace(0);pdf.text(n.link.slice(0,32),LC5+LC5W*0.6,ny+2);}
      pdf.setTextColor(...EF.dark);pdf.setCharSpace(0);ny+=5.5;
    });
    y5L+=newsH+2;

    // Analysis
    secBar(RC5,y5R,RC5W,7,'Analysis');y5R+=8;
    const analysisH=60;
    pdf.setFillColor(...EF.contentBg);pdf.roundedRect(RC5,y5R,RC5W,analysisH,0.5,0.5,'F');
    if(PR.analysis){
      pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontBody);pdf.setTextColor(35,35,33);pdf.setCharSpace(0);
      const lines=pdf.splitTextToSize(PR.analysis,RC5W-6);
      pdf.text(lines.slice(0,8),RC5+3,y5R+5);
    }
    y5R+=analysisH+2;

    // Key Attributes
    secBar(RC5,y5R,RC5W,7,'Key Attributes');y5R+=8;
    const attrH=H-y5R-32;
    const attrHalf=(RC5W-2)/2;
    pdf.setFillColor(...EF.green);
    pdf.roundedRect(RC5,y5R,attrHalf,7,0.5,0.5,'F');
    pdf.setFont('helvetica','bold');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.white);
    pdf.text('STRENGTHS',RC5+attrHalf/2,y5R+5,{align:'center'});
    pdf.setFillColor(...EF.orange);
    pdf.roundedRect(RC5+attrHalf+2,y5R,attrHalf,7,0.5,0.5,'F');
    pdf.setFont('helvetica','bold');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.white);
    pdf.text('WEAKNESSES',RC5+attrHalf+2+attrHalf/2,y5R+5,{align:'center'});
    y5R+=8;
    pdf.setFillColor(240,250,240);pdf.roundedRect(RC5,y5R,attrHalf,attrH,0.5,0.5,'F');
    pdf.setFillColor(255,245,240);pdf.roundedRect(RC5+attrHalf+2,y5R,attrHalf,attrH,0.5,0.5,'F');
    pdf.setCharSpace(0);pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontBody);pdf.setTextColor(30,80,30);
    PR.strengths.filter(Boolean).slice(0,8).forEach((s,i)=>{
      pdf.setCharSpace(0);
      pdf.text('+ '+String(s),RC5+3,y5R+5+i*6);
    });
    pdf.setCharSpace(0);pdf.setTextColor(100,30,10);
    PR.weaknesses.filter(Boolean).slice(0,8).forEach((s,i)=>{
      pdf.setCharSpace(0);
      pdf.text('- '+String(s),RC5+attrHalf+5,y5R+5+i*6);
    });
    y5R+=attrH+2;

    // Final Considerations (full width)
    const fcY=H-28;
    secBar(9,fcY,W-9-15,7,'Final Considerations');
    pdf.setFillColor(...EF.finalText);
    pdf.roundedRect(9,fcY+7,W-9-15,17,0.5,0.5,'F');
    if(PR.finalConsiderations){
      pdf.setFont('helvetica','normal');pdf.setFontSize(EF.fontBody);pdf.setTextColor(...EF.white);pdf.setCharSpace(0);
      const fcLines=pdf.splitTextToSize(PR.finalConsiderations,W-9-15-6);
      pdf.text(fcLines.slice(0,2),9+4,fcY+14);
    }

    // Scout/date bottom-right
    if(PR.scout||PR.dataRelatorio){
      pdf.setFont('helvetica','italic');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.light);
      const ss=[PR.scout&&'Scout: '+PR.scout,PR.dataRelatorio&&'Date: '+PR.dataRelatorio].filter(Boolean).join('   ');
      pdf.text(ss,W-15,H-3,{align:'right'});
    }

    /* ════════════════════════════════
       PAGE 6 — PHOTO + FINANCES
    ════════════════════════════════ */
    pdf.addPage([W,H],'landscape');
    // Fundo via template no drawHeader
    drawHeader(PR.nome,PR.posicao,PR.clube);

    const Y6=21, Y6c=Y6+4;
    // s6_photoW_pct=33% s6_photoY_pct=0% s6_FW_pct=70% LC_R=15mm LC_T=4mm
    const photoW=Math.round(W*33/100);
    if(PR.actionPhoto){
      try{
        const acImg=new Image();
        await new Promise(res=>{acImg.onload=res;acImg.onerror=res;acImg.src=PR.actionPhoto;});
        const acAsp=acImg.naturalWidth/(acImg.naturalHeight||1);
        const maxH=H-Y6, maxW=photoW;
        let pw=maxW, ph=maxW/acAsp;
        if(ph>maxH){ph=maxH;pw=maxH*acAsp;}
        if(pw>maxW){pw=maxW;ph=maxW/acAsp;}
        const px=(photoW-pw)/2;
        // s6_photoY_pct=0%: 0=topo, 100=centro
        const py=Y6+(maxH-ph)*0/100/2;
        // Normalizar imagem para JPEG via canvas (compatibilidade jsPDF)
        const _acNorm=await new Promise(res=>{
          const _i=new Image();
          _i.onload=()=>{
            const _c=document.createElement('canvas');
            _c.width=_i.naturalWidth;_c.height=_i.naturalHeight;
            _c.getContext('2d').drawImage(_i,0,0);
            res(_c.toDataURL('image/jpeg',0.93));
          };
          _i.onerror=()=>res(null);
          _i.src=PR.actionPhoto;
        });
        if(_acNorm) pdf.addImage(_acNorm,'JPEG',px,py,pw,ph);
      }catch(e){
        pdf.setFillColor(180,180,178);pdf.rect(0,Y6,photoW,H-Y6,'F');
      }
    } else {
      pdf.setFillColor(200,200,198);pdf.rect(0,Y6,photoW,H-Y6,'F');
      pdf.setFont('helvetica','italic');pdf.setFontSize(9);pdf.setTextColor(230,230,228);
      pdf.text('Action Photo',photoW/2,H/2,{align:'center'});
      pdf.text('Upload in Slide 6',photoW/2,H/2+6,{align:'center'});
    }

    // RIGHT: Finances
    const FX=photoW+6, FW=Math.round((W-FX-15)*70/100);  // s6_FW_pct=70% LC_R=15mm

    // Finance section title bar
    secBar(FX,Y6,FW,8,'Finances');
    let fy=Y6+12;

    const finItems=[
      ['Transfer Fee',PR.transferFee],
      ['Signing Fee (ER%)',PR.signingFee],
      ['Year Salary (Gross)',PR.yearSalary],
      ['Contract',PR.contract],
    ].filter(r=>r[1]);

    const fItemH=(H-Y6-12-6)/(finItems.length||1);
    const fH=Math.min(fItemH-2, 21);  // -30% vs original 30mm
    finItems.forEach(([lbl,val])=>{
      pdf.setFillColor(...EF.contentBg);pdf.setDrawColor(215,215,213);pdf.setLineWidth(.2);
      pdf.roundedRect(FX,fy,FW,fH,1.5,1.5,'FD');
      pdf.setFont('helvetica','bold');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.light);
      pdf.text(lbl.toUpperCase(),FX+5,fy+6);
      pdf.setFont('helvetica','bold');pdf.setFontSize(Math.min(14,fH*0.55));pdf.setTextColor(...EF.dark);
      pdf.text(String(val),FX+5,fy+fH-5);
      fy+=fH+3;
    });

    // Scout / date
    if(PR.scout||PR.dataRelatorio){
      pdf.setFont('helvetica','italic');pdf.setFontSize(EF.fontXs);pdf.setTextColor(...EF.light);
      const ss=[PR.scout&&'Scout: '+PR.scout,PR.dataRelatorio&&'Date: '+PR.dataRelatorio].filter(Boolean).join('   ');
      pdf.text(ss,W-8,H-3,{align:'right'});
    }

    /* ── SAVE metadata + imagens no Firebase Storage ── */
    const reportId = PR._id || ('pr_'+Date.now());
    PR._id = reportId; PR._savedAt = new Date().toISOString();
    const imgKeys=['coverPhoto','injuryImg','resumeImg','matches25Img','matches24Img','analyticsImgs','actionPhoto'];
    const reportMeta = Object.fromEntries(Object.entries(PR).filter(([k])=>!imgKeys.includes(k)));
    // Salvar localmente (fallback)
    try{ localStorage.setItem('pr_'+reportId, JSON.stringify(PR)); }catch(e){}
    if(db&&firebaseReady){
      // Upload imagens para Storage e guardar URLs no Firebase
      fbUploadPRImages(reportId,PR).then(imgUrls=>{
        db.ref('player_reports/'+reportId).set({...reportMeta,_imgUrls:imgUrls}).catch(e=>{});
      });
    }
    PR_SAVED[reportId]={...PR};
    return pdf;
}

async function gerarPlayerReport(){
  if(!PR.nome){alert('Informe o nome do jogador (Slide 1).');PR.step=1;renderPrStep();return;}
  const btn=document.getElementById('prGenBtn');
  if(btn){btn.textContent='⟳ Gerando…';btn.disabled=true;}
  try{
    const pdf = await buildPlayerReportPDF();
    const safeName=(PR.nome||'player').replace(/[^a-z0-9]/gi,'_').toUpperCase();
    pdf.save(`PlayerReport_${PR.posicao||'POS'}_${safeName}.pdf`);
    if(btn){btn.textContent='✓ Gerado!';btn.style.background='#1a8040';}
    setTimeout(()=>{if(btn){btn.textContent='📄 Gerar PDF';btn.style.background='';btn.disabled=false;}},2500);

    console.error('PDF error:',err);
    alert('Erro ao gerar PDF: '+err.message);
    if(btn){btn.textContent='📄 Gerar PDF';btn.style.background='';btn.disabled=false;}
  }
}

function prLoadSaved(id){
  const r=PR_SAVED[id];
  if(!r){ alert('Relatório não encontrado.'); return; }
  // Merge saved data into PR preserving defaults
  Object.assign(PR,r);
  PR.step=1;
  PR.news=PR.news||[{headline:'',link:''}];
  PR.strengths=PR.strengths||[''];
  PR.weaknesses=PR.weaknesses||[''];

function prDeleteSaved(id){

}

   PPTX EXPORT — Todos os slides nativos

// Retorna {w, h} da imagem base64 via canvas
function getImgDims(src){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res({w:img.naturalWidth,h:img.naturalHeight});
    img.onerror=()=>res({w:1,h:1}); // fallback seguro
    img.src=src;
  });
}

// Calcula dimensões contain: cabe dentro de boxW x boxH mantendo proporção
function containDims(imgW,imgH,boxW,boxH){
  const asp=imgW/imgH;
  let w=boxW, h=boxH;
  if(w/h>asp){w=h*asp;}else{h=w/asp;}
  return {w, h, x:(boxW-w)/2, y:(boxH-h)/2};
}

async function gerarPlayerReportPPTX(opts={}){
  if(!PR.nome){alert('Informe o nome do jogador (Slide 1).');PR.step=1;renderPrStep();return;}
  const btn=document.getElementById('prPptxBtn');
  if(btn){btn.textContent='⟳ Gerando…';btn.disabled=true;}
  try{
    if(typeof PptxGenJS==='undefined') throw new Error('PptxGenJS não carregou.');

    const pptx=new PptxGenJS();
    pptx.layout='LAYOUT_WIDE'; // 13.33" × 7.5"

    const W=13.33, H=7.5;
    const MM=W/297; // polegadas por mm (EF.W=297mm)

    // ── Paleta ──
    const C={
      bg:'E8E8E8', hdr:'343434', gold:'B49B46',
      dark:'141412', mid:'646462', light:'A0A09E',
      contentBg:'F5F5F3', white:'FFFFFF',
      green:'4CAF50', orange:'E65100', secBar:'444444'
    };

    // ── Helper: cabeçalho (slides 2–6) ──
    function addHeader(slide){
      // Template de fundo (contém logos dos times, linha dourada, Eagle Football)
      try{ slide.addImage({data:SLIDE_MASTER_BG,x:0,y:0,w:W,h:H}); }catch(e){}
      // Barra escura do cabeçalho
      slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:W,h:18.5*MM,fill:{color:C.hdr},line:{color:C.hdr}});
      // Linha dourada
      slide.addShape(pptx.ShapeType.rect,{x:0,y:18.5*MM,w:W,h:0.5*MM,fill:{color:C.gold},line:{color:C.gold}});
      // Foto do jogador (canto esquerdo do header)
      if(PR.coverPhoto){
        try{ slide.addImage({data:PR.coverPhoto,x:0,y:0,w:16*MM,h:18.5*MM,sizing:{type:'contain',w:16*MM,h:18.5*MM}}); }catch(e){}
      }
      // Nome do jogador + Badge de posição (badge calculado ANTES para limitar largura do nome)
      const nameX=PR.coverPhoto?16*MM+0.05:0.15;
      // bx: posição do badge — 0.165 pol por char é mais preciso para fontSize 18 bold
      const _nameLen=(PR.nome||'').length;
      const bx=PR.posicao ? nameX+Math.min(_nameLen*0.165, 5.2) : 99;
      // Largura do nome limitada para não sobrepor badge (deixa 0.1in de gap)
      const nameW=PR.posicao ? Math.max(bx-nameX-0.05, 1) : 7;
      slide.addText((PR.nome||'').toUpperCase(),{x:nameX,y:0,w:nameW,h:18.5*MM,fontSize:18,bold:true,color:C.white,fontFace:'Helvetica Neue',valign:'middle'});
      // Badge de posição
      if(PR.posicao){
        slide.addShape(pptx.ShapeType.rect,{x:bx,y:3*MM,w:0.55,h:13.5*MM,fill:{color:C.gold},line:{color:C.gold}});
        slide.addText(PR.posicao,{x:bx,y:3*MM,w:0.55,h:13.5*MM,fontSize:8,bold:true,color:C.white,align:'center',valign:'middle',fontFace:'Helvetica Neue'});
      }
      // Eagle Football (direito) — já está no template, mas reforçamos a cor escura por cima
      slide.addText(['EAGLE','FOOTBALL',PR.clube||''].join('\n'),{x:W-2.2,y:0.04,w:2.15,h:18.5*MM,fontSize:6,color:'C8C4A0',align:'right',valign:'middle',fontFace:'Helvetica Neue'});
    }

    // ── Helper: barra de seção ──
    function secBar(slide,x,y,w,h,label){
      slide.addShape(pptx.ShapeType.rect,{x,y,w,h,fill:{color:C.secBar},line:{color:C.secBar}});
      slide.addText(label.toUpperCase(),{x:x+0.05,y,w:w-0.1,h,fontSize:6,bold:true,color:C.white,valign:'middle',charSpacing:1.5,fontFace:'Helvetica Neue'});
    }

    // ── Helper: caixa de conteúdo ──
    function box(slide,x,y,w,h){
      slide.addShape(pptx.ShapeType.rect,{x,y,w,h,fill:{color:C.contentBg},line:{color:'D7D7D5',pt:0.5}});
    }

    // ── Helper: campo label+valor ──
    function field(slide,x,y,w,h,label,value){
      box(slide,x,y,w,h);
      slide.addText(label.toUpperCase(),{x:x+0.05,y:y+0.03,w:w-0.1,h:0.14,fontSize:5.5,bold:true,color:C.light,fontFace:'Helvetica Neue'});
      slide.addText(String(value||''),{x:x+0.05,y:y+0.18,w:w-0.1,h:h-0.2,fontSize:8,color:C.dark,fontFace:'Helvetica Neue',valign:'top'});
    }

    /* ════════════════════════════════
       SLIDE 1 — CAPA
    ════════════════════════════════ */
    const coverImg=await renderCoverCanvas(PR);
    const s1=pptx.addSlide();
    s1.addImage({data:coverImg,x:0,y:0,w:W,h:H});

    /* ════════════════════════════════
       SLIDE 2 — INFO GERAL
    ════════════════════════════════ */
    const s2=pptx.addSlide();
    s2.background={color:C.bg};
    addHeader(s2);

    // S2: LC=10mm LC_R=20mm LC_T=9.5mm LCW=49%
    const Y2=(18.5+9.5)*MM;
    const LC=10*MM, LCW=W*0.49-LC;
    const RC=LC+LCW+3*MM, RCW=W-RC-20*MM;

    // Basic Info
    secBar(s2,LC,Y2,LCW,7*MM,'Basic Information');
    let ly=Y2+7*MM;

/* ── Modal Gerenciar Scouts ── */
function openScoutModal(){
  scoutPick=nextFreePaletteIndex();
  document.getElementById('scoutModalBody').innerHTML=renderScoutModalContent();
  document.getElementById('scoutModal').style.display='flex';
}
function closeScoutModal(){ document.getElementById('scoutModal').style.display='none'; }
function selectScoutColor(i){
  scoutPick=i;
  document.querySelectorAll('#scoutModal [data-sw]').forEach(el=>{el.style.borderColor=(+el.dataset.sw===i)?'#e8c84a':'transparent';});
}
function addScoutFromModal(){
  const inp=document.getElementById('scNewName');
  const name=(inp.value||'').trim();
  if(!name){alert('Digite o nome do scout.');return;}
  if(SCOUTS.includes(name)){alert('Já existe um scout com esse nome.');return;}
  addScout(name,SCOUT_PALETTE[scoutPick]);
  inp.value='';
  scoutPick=nextFreePaletteIndex();
  document.getElementById('scoutModalBody').innerHTML=renderScoutModalContent();
  const f=document.getElementById('scNewName'); if(f) f.focus();
}
function renderScoutModalContent(){
  const list=SCOUTS.map(s=>{
    const c=SCOUT_COLORS[s]||{btn:'#888'};
    const n=DATA.filter(x=>x.scouts.includes(s)).length;
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:#1a1a18;border-radius:5px;margin-bottom:4px">
      <span style="width:14px;height:14px;border-radius:3px;background:${c.btn};flex:none"></span>

      <span style="font-size:10px;color:#777">${n} comp.</span>

    </div>`;
  }).join('');

function saveNewComp(){
  const name=document.getElementById("acName").value.trim();
  const start=document.getElementById("acStart").value;
  const end=document.getElementById("acEnd").value;
  if(!name||!start||!end){alert("Preencha Nome, Início e Fim.");return;}
  const newId=Math.max(0,...DATA.map(c=>c.id),...Object.keys(DELETED).map(Number))+1;
  const newComp={
    id:newId,
    group:document.getElementById("acGroup").value,
    subgroup:document.getElementById("acSub").value||"Outros",
    name, start, end,
    country:document.getElementById("acCountry").value||"",
    level:document.getElementById("acLevel").value,
    scouts:[]
  };
  DATA.push(newComp);
  saveData();
  closeAddCompModal();
  renderViews();
}
function deleteComp(id){
  const comp=DATA.find(c=>c.id===id);
  if(!comp)return;
  if(!confirm(`Excluir "${comp.name}"?\nOs relatórios desta competição também serão removidos.`))return;
  DATA=DATA.filter(c=>c.id!==id);
  delete REPORTS[id];
  DELETED[id]=true;                                  // lápide: não volta no reload
  if(db&&firebaseReady) db.ref('deleted/'+id).set(true);
  saveData();                                        // reescreve /cal já sem essa competição
  renderViews();
}

const POS_LABEL={GK:'Goalkeeper',CB:'Centre-Back',LB:'Left Back',RB:'Right Back',
  CDM:'Def. Midfielder',CM:'Central Mid.',CAM:'Att. Midfielder',
  LM:'Left Midfielder',RM:'Right Midfielder',LW:'Left Winger',RW:'Right Winger',
  SS:'Second Striker',CF:'Centre Forward',ST:'Striker'};

function fmtDob(dob){
  if(!dob)return'—';
  const[y,m,d]=dob.split('-');
  const mn=['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
  return`${mn[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

// Converte rep → PR mínimo só para renderCoverCanvas

  return{nome:rep.nome||'',posicao:rep.pos||'',clube:rep.clube||'',
    pais:rep.nac||'',coverPhoto:rep.photo||null,scout:rep.scout||'',
    dataRelatorio:rep.data||''};
}

async function exportRcardSimplePDF(repId){
  const rep=getReports(currentCompId).find(r=>r.id===repId);
  if(!rep){alert('Relatório não encontrado.');return;}
  const btn=event.target; btn.textContent='⏳'; btn.disabled=true;
  try{
    const{jsPDF}=window.jspdf;
    const W=297,H=167.0625;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:[W,H]});
    pdf.setCharSpace(0);

    const coverPR=repToCoverPR(rep);

    // ── Pág 2: layout do print ──

    const comp=DATA.find(c=>c.id===currentCompId)||{};

    const safe=(rep.nome||'player').replace(/[^a-z0-9]/gi,'_').toUpperCase();
    pdf.save(`ScoutCard_${rep.pos||'POS'}_${safe}.pdf`);
    btn.textContent='✓ PDF';
    setTimeout(()=>{btn.textContent='📄 PDF';btn.disabled=false;},2000);
  }catch(e){console.error(e);alert('Erro: '+e.message);btn.textContent='📄 PDF';btn.disabled=false;}
}

//  PÁGINA INTERNA — PDF
// ═══════════════════════════════════════════════════════
async function drawScoutCardPage(pdf,rep,comp,W,H){
  const BG='#EDEBE7',CARD='#FFFFFF',HDR='#7A6645';
  const GRN='#2D7A3A',GRNBG='#E4F5E7',RED='#B03830',REDBG='#FAECEA';
  const DARK='#1a1a18',LIGHT='#777772',MUTED='#AAAAAA';
  const PAD=7,BNH=9.5,IP=7;
  const C1W=69,PHH=55,badge_h=10,badge_fs=6;
  const FH=11.5,FGAP=2,field_fs_lbl=3,field_fs_val=5;
  const ogol_h=8.5,ogol_lbl_fs=4.5,ogol_url_fs=3.5;
  const bs_h=8.5,bs_lbl_fs=4.5,bs_url_fs=3.5,bs_lbl_w=25;
  const C2W=64,field_h_pct=86;
  const sw_col_gap=4.5,sw_hdr_h=11,sw_hdr_fs=7.5;
  const sw_item_fs=6,sw_gap=10,sw_start=21;
  const banner_title_fs=5.5,banner_sub_fs=4;
  const FS=2.835;

  pdf.setFillColor(BG); pdf.rect(0,0,W,H,'F');

  // Banner
  pdf.setFillColor(HDR); pdf.roundedRect(PAD,PAD,W-PAD*2,BNH,1.5,1.5,'F');
  pdf.setFont('helvetica','bolditalic'); pdf.setFontSize(banner_title_fs*FS);
  pdf.setTextColor('#FFFFFF'); pdf.setCharSpace(0);
  pdf.text(`${(rep.nome||'').toUpperCase()} (${rep.clube||''} - ${rep.nac||''})`,PAD+4,PAD+BNH*0.73);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(banner_sub_fs*FS);
  pdf.setTextColor('#E8C84A'); pdf.setCharSpace(0);
  pdf.text(`${comp.name||''} · Scout: ${rep.scout||''} · ${rep.data||''}`,W-PAD-2,PAD+BNH*0.73,{align:'right'});

  // Card
  const CX=PAD,CY=PAD+BNH+3,CW=W-PAD*2,CH=H-CY-PAD;
  pdf.setFillColor(CARD); pdf.setDrawColor('#CCCAC6');
  pdf.roundedRect(CX,CY,CW,CH,2,2,'FD');
  const iX=CX+IP,iY=CY+IP,iH=CH-IP*2;

  // Foto
  const pW=C1W,pH=PHH;
  if(rep.photo){
    try{
      const{w:iW2,h:iH2}=await getImgDims(rep.photo);
      const cd=containDims(iW2,iH2,pW,pH);
      pdf.roundedRect(iX,iY,pW,pH,1.5,1.5,'S');
      pdf.addImage(rep.photo,iX+cd.x,iY+cd.y,cd.w,cd.h);
    }catch(e){pdf.setFillColor('#C8C4BE');pdf.roundedRect(iX,iY,pW,pH,1.5,1.5,'F');}
  }else{pdf.setFillColor('#C8C4BE');pdf.roundedRect(iX,iY,pW,pH,1.5,1.5,'F');}
  pdf.setFillColor(HDR); pdf.rect(iX,iY+pH-badge_h,pW,badge_h,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(badge_fs*FS); pdf.setTextColor('#E8C84A');
  pdf.setCharSpace(0); pdf.text(rep.pos||'',iX+pW/2,iY+pH-badge_h*0.28,{align:'center'});

  // Campos
  let fy=iY+pH+3;
  const fld=(lbl,val,x,y,w,hl)=>{
    pdf.setFillColor(hl?'#D8E8F8':CARD); pdf.setDrawColor('#CCCAC6');
    pdf.roundedRect(x,y,w,FH,0.8,0.8,'FD');
    pdf.setFont('helvetica','normal'); pdf.setFontSize(field_fs_lbl*FS); pdf.setTextColor(LIGHT);
    pdf.setCharSpace(0); pdf.text(lbl,x+1.8,y+FH*0.38);
    pdf.setFont('helvetica','bold'); pdf.setFontSize(field_fs_val*FS); pdf.setTextColor(DARK);
    pdf.setCharSpace(0); pdf.text(String(val||'—'),x+1.8,y+FH*0.82);
  };
  const box=(lbl,val,x,y,w)=>{
    pdf.setFillColor('#E2DEDB'); pdf.roundedRect(x,y,w,FH,0.8,0.8,'F');
    pdf.setFont('helvetica','normal'); pdf.setFontSize(field_fs_lbl*FS); pdf.setTextColor(LIGHT);
    pdf.setCharSpace(0); pdf.text(lbl,x+1.8,y+FH*0.38);
    pdf.setFont('helvetica','bold'); pdf.setFontSize(field_fs_val*FS); pdf.setTextColor(DARK);
    pdf.setCharSpace(0); pdf.text(String(val||'—'),x+1.8,y+FH*0.82);
  };

  fld('Name',rep.nome||'',iX,fy,pW,true); fy+=FH+FGAP;
  fld('D.O.B',fmtDob(rep.dob),iX,fy,pW*0.54-0.5); fld('Contract',rep.contrato||'—',iX+pW*0.54,fy,pW*0.46); fy+=FH+FGAP;
  const BW=(pW-2)/3;
  box('Height',rep.alt?(rep.alt+' cm'):'—',iX,fy,BW);
  box('Strong Foot',rep.pe||'—',iX+BW+1,fy,BW);
  box('Build',rep.fis||'—',iX+BW*2+2,fy,BW); fy+=FH+FGAP;
  fld('TM Value (EUR)',rep.tm||'—',iX,fy,pW); fy+=FH+FGAP;

  // OGol
  const linkW=Math.min(pW*2,CX+CW-IP-iX);
  pdf.setFillColor('#16203A'); pdf.roundedRect(iX,fy,linkW,ogol_h,0.8,0.8,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(ogol_lbl_fs*FS); pdf.setTextColor('#7fbfff');
  pdf.setCharSpace(0); pdf.text('OGol',iX+2,fy+ogol_h*0.65);
  if(rep.ogolLink){
    pdf.setFont('helvetica','normal'); pdf.setFontSize(ogol_url_fs*FS); pdf.setTextColor('#aaddff');
    pdf.setCharSpace(0);
    const og=pdf.splitTextToSize(rep.ogolLink,linkW-bs_lbl_w-1);
    pdf.text(og[0]||'',iX+bs_lbl_w,fy+ogol_h*0.65);
  }
  fy+=ogol_h+FGAP;

  // Besoccer
  pdf.setFillColor('#1a2e4a'); pdf.roundedRect(iX,fy,linkW,bs_h,0.8,0.8,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(bs_lbl_fs*FS); pdf.setTextColor('#7fbfff');
  pdf.setCharSpace(0); pdf.text('Besoccer',iX+2,fy+bs_h*0.65);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(bs_url_fs*FS); pdf.setTextColor('#aaddff');
  pdf.setCharSpace(0);
  const bsLink=rep.besoccerLink||('https://pro.besoccer.com/player/'+encodeURIComponent(rep.nome||''));
  const bsL=pdf.splitTextToSize(bsLink,linkW-bs_lbl_w-1);
  pdf.text(bsL[0]||'',iX+bs_lbl_w,fy+bs_h*0.65);

  // Campo futebol
  const C2X=iX+pW+4,fw=C2W;
  const FLH=iH*(field_h_pct/100);
  const ppCv=await renderPPCanvas({posicao:rep.pos,posicaoSec:'',sistema:''},
    Math.round(fw/0.154688),Math.round(FLH/0.154688));
  try{pdf.addImage(ppCv.toDataURL('image/png'),C2X,iY,fw,FLH);}catch(e){}

  // Strengths
  const C3X=C2X+fw+sw_col_gap,SWCW=(CX+CW-IP-C3X)/2-2;
  pdf.setFillColor(GRN); pdf.roundedRect(C3X,iY,SWCW,sw_hdr_h,1.5,1.5,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(sw_hdr_fs*FS); pdf.setTextColor('#FFFFFF');
  pdf.setCharSpace(0); pdf.text('Strengths',C3X+SWCW/2,iY+sw_hdr_h*0.68,{align:'center'});
  pdf.setFillColor(GRNBG); pdf.roundedRect(C3X,iY+sw_hdr_h+0.5,SWCW,iH-sw_hdr_h-1,1,1,'F');
  const frc=(rep.forcas||'').split('\n').filter(Boolean);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(sw_item_fs*FS); pdf.setTextColor('#1a3d22');
  frc.forEach((f,i)=>{pdf.setCharSpace(0);pdf.text(`- ${f}`,C3X+3,iY+sw_start+i*sw_gap);});

  // Weaknesses
  const C4X=C3X+SWCW+3,C4W=CX+CW-IP-C4X;
  pdf.setFillColor(RED); pdf.roundedRect(C4X,iY,C4W,sw_hdr_h,1.5,1.5,'F');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(sw_hdr_fs*FS); pdf.setTextColor('#FFFFFF');
  pdf.setCharSpace(0); pdf.text('Weaknesses',C4X+C4W/2,iY+sw_hdr_h*0.68,{align:'center'});
  pdf.setFillColor(REDBG); pdf.roundedRect(C4X,iY+sw_hdr_h+0.5,C4W,iH-sw_hdr_h-1,1,1,'F');
  const frq=(rep.fraquezas||'').split('\n').filter(Boolean);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(sw_item_fs*FS); pdf.setTextColor('#3d1818');
  frq.forEach((f,i)=>{pdf.setCharSpace(0);pdf.text(`- ${f}`,C4X+3,iY+sw_start+i*sw_gap);});
}
async function drawScoutCardPPTX(pptx,rep,comp,W,H,MM){
  const s=pptx.addSlide(); s.background={color:'EDEBE7'};
  const PAD=7*MM,BNH=9.5*MM,IP=7*MM;
  const C1W=69*MM,PHH=55*MM,badge_h=10*MM,badge_fs=6;
  const FH=11.5*MM,FGAP=2*MM,field_fs_lbl=3,field_fs_val=5;
  const ogol_h=8.5*MM,ogol_lbl_fs=4.5,ogol_url_fs=3.5;
  const bs_h=8.5*MM,bs_lbl_fs=4.5,bs_url_fs=3.5,bs_lbl_w=25*MM;
  const C2W=64*MM,field_h_pct=86;
  const sw_col_gap=4.5*MM,sw_hdr_h=11*MM,sw_hdr_fs=7.5;
  const sw_item_fs=6,sw_gap=10*MM,sw_start=21*MM;
  const banner_title_fs=5.5,banner_sub_fs=4;
  const HDR='7A6645',GRN='2D7A3A',GRNBG='E4F5E7',RED='B03830',REDBG='FAECEA';
  const DARK='1a1a18',LIGHT='777772',CARD='FFFFFF';

  s.addShape(pptx.ShapeType.roundRect,{x:PAD,y:PAD,w:W-PAD*2,h:BNH,fill:{color:HDR},line:{color:HDR},rectRadius:0.015});
  s.addText(`${(rep.nome||'').toUpperCase()} (${rep.clube||''} - ${rep.nac||''})`,
    {x:PAD+4*MM,y:PAD,w:W-PAD*3,h:BNH,fontSize:banner_title_fs,bold:true,italic:true,color:CARD,valign:'middle',fontFace:'Helvetica Neue'});
  s.addText(`${comp.name||''} · Scout: ${rep.scout||''} · ${rep.data||''}`,
    {x:PAD,y:PAD,w:W-PAD*2,h:BNH,fontSize:banner_sub_fs,color:'E8C84A',align:'right',valign:'middle',fontFace:'Helvetica Neue'});

  const CX=PAD,CY=PAD+BNH+3*MM,CW=W-PAD*2,CH=H-CY-PAD;
  s.addShape(pptx.ShapeType.roundRect,{x:CX,y:CY,w:CW,h:CH,fill:{color:CARD},line:{color:'CCCAC6',pt:0.5},rectRadius:0.02});
  const iX=CX+IP,iY=CY+IP,iH=CH-IP*2;

  const pW=C1W,pH=PHH;
  if(rep.photo){
    try{
      const{w:iW2,h:iH2}=await getImgDims(rep.photo);
      const cd=containDims(iW2,iH2,pW/MM,pH/MM);
      s.addImage({data:rep.photo,x:iX+cd.x*MM,y:iY+cd.y*MM,w:cd.w*MM,h:cd.h*MM});
    }catch(e){}
  }else{
    s.addShape(pptx.ShapeType.roundRect,{x:iX,y:iY,w:pW,h:pH,fill:{color:'C8C4BE'},line:{color:'C8C4BE'},rectRadius:0.015});
  }
  s.addShape(pptx.ShapeType.rect,{x:iX,y:iY+pH-badge_h,w:pW,h:badge_h,fill:{color:HDR},line:{color:HDR}});
  s.addText(rep.pos||'',{x:iX,y:iY+pH-badge_h,w:pW,h:badge_h,fontSize:badge_fs,bold:true,color:'E8C84A',align:'center',valign:'middle',fontFace:'Helvetica Neue'});

  const addFld=(lbl,val,x,y,w,hl)=>{
    s.addShape(pptx.ShapeType.roundRect,{x,y,w,h:FH,fill:{color:hl?'D8E8F8':CARD},line:{color:'CCCAC6',pt:0.3},rectRadius:0.008});
    s.addText(lbl,{x:x+1.8*MM,y,w,h:FH*0.42,fontSize:field_fs_lbl,color:LIGHT,valign:'bottom',fontFace:'Helvetica Neue'});
    s.addText(String(val||'—'),{x:x+1.8*MM,y:y+FH*0.42,w,h:FH*0.58,fontSize:field_fs_val,bold:true,color:DARK,valign:'top',fontFace:'Helvetica Neue'});
  };
  const addBox=(lbl,val,x,y,w)=>{
    s.addShape(pptx.ShapeType.roundRect,{x,y,w,h:FH,fill:{color:'E2DEDB'},line:{color:'E2DEDB'},rectRadius:0.008});
    s.addText(lbl,{x:x+1.8*MM,y,w,h:FH*0.42,fontSize:field_fs_lbl,color:LIGHT,valign:'bottom',fontFace:'Helvetica Neue'});
    s.addText(String(val||'—'),{x:x+1.8*MM,y:y+FH*0.42,w,h:FH*0.58,fontSize:field_fs_val,bold:true,color:DARK,valign:'top',fontFace:'Helvetica Neue'});
  };

  let fy=iY+pH+3*MM;
  addFld('Name',rep.nome||'',iX,fy,pW,true); fy+=FH+FGAP;
  addFld('D.O.B',fmtDob(rep.dob),iX,fy,pW*0.54-0.5*MM); addFld('Contract',rep.contrato||'—',iX+pW*0.54,fy,pW*0.46); fy+=FH+FGAP;
  const BW=(pW-2*MM)/3;
  addBox('Height',rep.alt?(rep.alt+' cm'):'—',iX,fy,BW);
  addBox('Strong Foot',rep.pe||'—',iX+BW+1*MM,fy,BW);
  addBox('Build',rep.fis||'—',iX+BW*2+2*MM,fy,BW); fy+=FH+FGAP;
  addFld('TM Value (EUR)',rep.tm||'—',iX,fy,pW); fy+=FH+FGAP;

  const linkW2=Math.min(pW*2,CX+CW-IP-iX);
  s.addShape(pptx.ShapeType.roundRect,{x:iX,y:fy,w:linkW2,h:ogol_h,fill:{color:'16203A'},line:{color:'16203A'},rectRadius:0.008});
  s.addText('OGol',{x:iX+2*MM,y:fy,w:bs_lbl_w-2*MM,h:ogol_h,fontSize:ogol_lbl_fs,bold:true,color:'7fbfff',valign:'middle',fontFace:'Helvetica Neue'});
  if(rep.ogolLink) s.addText(rep.ogolLink,{x:iX+bs_lbl_w,y:fy,w:linkW2-bs_lbl_w-1*MM,h:ogol_h,fontSize:ogol_url_fs,color:'aaddff',valign:'middle',fontFace:'Helvetica Neue'});
  fy+=ogol_h+FGAP;

  s.addShape(pptx.ShapeType.roundRect,{x:iX,y:fy,w:linkW2,h:bs_h,fill:{color:'1a2e4a'},line:{color:'1a2e4a'},rectRadius:0.008});
  s.addText('Besoccer',{x:iX+2*MM,y:fy,w:bs_lbl_w-2*MM,h:bs_h,fontSize:bs_lbl_fs,bold:true,color:'7fbfff',valign:'middle',fontFace:'Helvetica Neue'});
  s.addText(rep.besoccerLink||('https://pro.besoccer.com/player/'+encodeURIComponent(rep.nome||'')),
    {x:iX+bs_lbl_w,y:fy,w:linkW2-bs_lbl_w-1*MM,h:bs_h,fontSize:bs_url_fs,color:'aaddff',valign:'middle',fontFace:'Helvetica Neue'});

  const C2X=iX+pW+4*MM,fw=C2W,FLH=iH*(field_h_pct/100);
  const ppCv=await renderPPCanvas({posicao:rep.pos,posicaoSec:'',sistema:''},
    Math.round(fw/MM/0.154688)*2,Math.round(FLH/MM/0.154688)*2);
  try{s.addImage({data:ppCv.toDataURL('image/png'),x:C2X,y:iY,w:fw,h:FLH});}catch(e){}

  const C3X=C2X+fw+sw_col_gap,SWCW=(CX+CW-IP-C3X)/2-2*MM;
  s.addShape(pptx.ShapeType.roundRect,{x:C3X,y:iY,w:SWCW,h:sw_hdr_h,fill:{color:GRN},line:{color:GRN},rectRadius:0.02});
  s.addText('Strengths',{x:C3X,y:iY,w:SWCW,h:sw_hdr_h,fontSize:sw_hdr_fs,bold:true,color:CARD,align:'center',valign:'middle',fontFace:'Helvetica Neue'});
  const frc=(rep.forcas||'').split('\n').filter(Boolean);
  s.addShape(pptx.ShapeType.roundRect,{x:C3X,y:iY+sw_hdr_h+0.5*MM,w:SWCW,h:iH-sw_hdr_h-1*MM,fill:{color:GRNBG},line:{color:GRNBG},rectRadius:0.01});
  frc.forEach((f,i)=>s.addText(`- ${f}`,{x:C3X+3*MM,y:iY+sw_start+i*sw_gap,w:SWCW-4*MM,h:sw_gap*0.9,fontSize:sw_item_fs,color:'1a3d22',fontFace:'Helvetica Neue'}));

  const C4X=C3X+SWCW+3*MM,C4W=CX+CW-IP-C4X;
  s.addShape(pptx.ShapeType.roundRect,{x:C4X,y:iY,w:C4W,h:sw_hdr_h,fill:{color:RED},line:{color:RED},rectRadius:0.02});
  s.addText('Weaknesses',{x:C4X,y:iY,w:C4W,h:sw_hdr_h,fontSize:sw_hdr_fs,bold:true,color:CARD,align:'center',valign:'middle',fontFace:'Helvetica Neue'});
  const frq=(rep.fraquezas||'').split('\n').filter(Boolean);
  s.addShape(pptx.ShapeType.roundRect,{x:C4X,y:iY+sw_hdr_h+0.5*MM,w:C4W,h:iH-sw_hdr_h-1*MM,fill:{color:REDBG},line:{color:REDBG},rectRadius:0.01});
  frq.forEach((f,i)=>s.addText(`- ${f}`,{x:C4X+3*MM,y:iY+sw_start+i*sw_gap,w:C4W-4*MM,h:sw_gap*0.9,fontSize:sw_item_fs,color:'3d1818',fontFace:'Helvetica Neue'}));
}
function prSaveDraft(){
  if(!PR.nome){alert('Informe o nome do jogador primeiro.');return;}
  const id=PR._id||('pr_'+Date.now());
  PR._id=id; PR._savedAt=new Date().toISOString();
  const imgKeys=['coverPhoto','injuryImg','resumeImg','matches25Img','matches24Img','analyticsImgs','actionPhoto'];
  const meta=Object.fromEntries(Object.entries(PR).filter(([k])=>!imgKeys.includes(k)));
  try{localStorage.setItem('pr_'+id,JSON.stringify(PR));}catch(e){}
  if(db&&firebaseReady){
    fbUploadPRImages(id,PR).then(imgUrls=>{
      db.ref('player_reports/'+id).set({...meta,_imgUrls:imgUrls}).catch(e=>{});
    });
  }
  PR_SAVED[id]={...PR};
  // Flash feedback
  const btns=document.querySelectorAll('button');
  btns.forEach(b=>{if(b.textContent.includes('Salvar')){
    const orig=b.textContent;b.textContent='✓ Salvo!';b.style.color='#1a8040';
    setTimeout(()=>{b.textContent=orig;b.style.color='';},2000);
  }});
}

            <option>AMERICA DO SUL BASE</option><option>AMERICAS MUNDO</option><option>OUTRO</option>
          </select></div>
        <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">SUBGRUPO</label>
          <input id="acSub" placeholder="Ex: Profissional" style="width:100%;background:#1a1a18;border:1px solid #3a3835;border-radius:5px;color:#f1efe8;padding:6px 8px;font-size:12px"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">INÍCIO *</label>
          <input id="acStart" type="date" style="width:100%;background:#1a1a18;border:1px solid #3a3835;border-radius:5px;color:#f1efe8;padding:6px 8px;font-size:12px"></div>
        <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">FIM *</label>
          <input id="acEnd" type="date" style="width:100%;background:#1a1a18;border:1px solid #3a3835;border-radius:5px;color:#f1efe8;padding:6px 8px;font-size:12px"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

        <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">NÍVEL</label>
          <select id="acLevel" style="width:100%;background:#1a1a18;border:1px solid #3a3835;border-radius:5px;color:#f1efe8;padding:6px 8px;font-size:12px">
            <option>Profissional</option><option>Base</option>
          </select></div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:18px">
      <button onclick="closeAddCompModal()" style="background:transparent;border:1px solid #3a3835;color:#888;border-radius:5px;padding:6px 16px;cursor:pointer;font-size:12px">Cancelar</button>

    </div>

</div>
